<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .block {
            background-color: #5bc0de;
            border: 2px solid white;
            color: white;
            font-size: 1.5rem;
            text-align: center;
            padding: 30px 10px;
        }
        .block6 {
            background-color: #0275d8; 
            padding-top: 203px;
            padding-bottom: 200px;
        }
        
        .block3{
            padding-bottom: 150px;
            padding-top: 150px;
            align-items: center;
        }
        .block4, .block1, .block8{
            background-color: #0275d8;
        }
        .block-bottom{
            margin-top: -110px;
        }
        .block-aside{
            padding-top: 51px;
            padding-bottom: 51px;
        }
        
    </style>
</head>
<body>
    <div class="container-fluid p-3">
        <div class="row g-2">
            <div class="col-md-4"><div class="block block1">block 1</div></div>
            <div class="col-md-8"><div class="block">block 2</div></div>
        </div>

        <div class="row g-2">
            <div class="col-md-6"><div class="block block3">block 3</div></div>
            <div class="col-md-2"><div class="block block6">block 6</div></div>
            <div class="col-md-4">
                <div class="row g-2">
                    <div class="col-12"><div class="block block-aside">block 7</div></div>
                    <div class="col-12"><div class="block block8 block-aside">block 8</div></div>
                    <div class="col-12"><div class="block block-aside">block 9</div></div>
                </div>
            </div>
        </div>

        <div class="row g-2 block-bottom">
            <div class="col-md-3 pb-3"><div class="block block4">block 4</div></div>
            <div class="col-md-3 pb-3"><div class="block">block 5</div></div>
        </div>
    </div>
</body>
</html>
